<html>
    <head>
        <!-- 設定網頁編碼，避免中文亂碼 -->
        <meta charset="utf-8" />

        <!-- 網頁標題（顯示在瀏覽器分頁） -->
        <title>登入範例</title>
    </head>

    <body>

        <!--
            建立表單
            method=post 表示資料用 POST 傳送
            action="login.php" 表示送到 login.php 處理登入
        -->
        <form method="post" action="login.php">

            <!-- 帳號輸入欄位 -->
            帳號:
            <input type="text" name="id"><br/>

            <!-- 密碼輸入欄位 -->
            密碼:
            <input type="password" name="pwd"><br/>

            <!-- 送出按鈕 -->
            <input type="submit" value="登入">

            <!-- 清除表單資料按鈕 -->
            <input type="reset" value="清除">

        </form>

    </body>
</html>
